---
layout: default
---

<div class="photo-content">
  <article class="photo-article">
    {% if page.image %}
    <div class="photo-image">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="hover-effect">
    </div>
    {% endif %}

    <div class="photo-description">
      {{ content }}
    </div>
  </article>
</div>
