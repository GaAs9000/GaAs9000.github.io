<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery | GaAs9000</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/photo.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">GaAs9000</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/teaching">Teaching</a>
                <a href="/blog">Blog</a>
                <a href="/cv">CV</a>
                <a href="/photo" class="active">Photos</a>
            </div>
        </div>
    </nav>

    <!-- 画廊主体 -->
    <main class="photo-container">
        {% for photo in site.photos reversed %}
        <article class="photo-item">
            <div class="photo-content">
                <header class="photo-header">
                    <h2 class="photo-title">{{ photo.title }}</h2>
                    <div class="photo-metadata">
                        <span class="photo-location">
                            <i class="fas fa-map-marker-alt"></i> {{ photo.location }}
                        </span>
                        <time class="photo-date">{{ photo.date | date: "%B %d, %Y" }}</time>
                    </div>
                </header>
                
                <div class="photo-image">
                    <img src="{{ photo.image }}" alt="{{ photo.title }}">
                </div>
                
                <div class="photo-description">
                    {{ photo.content }}
                </div>
            </div>
        </article>
        {% endfor %}
    </main>

    <script src="/assets/js/photo.js"></script>
</body>
</html>
